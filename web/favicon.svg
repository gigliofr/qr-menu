<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background gradiente -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7931E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="qrGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333333;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circolare -->
  <circle cx="96" cy="96" r="96" fill="url(#bgGrad)"/>
  
  <!-- Border bianco -->
  <circle cx="96" cy="96" r="92" fill="none" stroke="white" stroke-width="2"/>
  
  <!-- QR Code stilizzato (metà sinistra) -->
  <g transform="translate(35, 35)">
    <!-- Quadrante top-left -->
    <rect x="0" y="0" width="8" height="8" fill="url(#qrGrad)"/>
    <rect x="12" y="0" width="8" height="8" fill="url(#qrGrad)"/>
    <rect x="20" y="0" width="8" height="8" fill="url(#qrGrad)"/>
    <rect x="36" y="0" width="8" height="8" fill="url(#qrGrad)"/>
    
    <rect x="0" y="12" width="8" height="8" fill="url(#qrGrad)"/>
    <rect x="36" y="12" width="8" height="8" fill="url(#qrGrad)"/>
    
    <rect x="0" y="20" width="8" height="8" fill="url(#qrGrad)"/>
    <rect x="12" y="20" width="8" height="8" fill="url(#qrGrad)"/>
    <rect x="20" y="20" width="8" height="8" fill="url(#qrGrad)"/>
    <rect x="36" y="20" width="8" height="8" fill="url(#qrGrad)"/>
    
    <rect x="0" y="36" width="8" height="8" fill="url(#qrGrad)"/>
    <rect x="12" y="36" width="8" height="8" fill="url(#qrGrad)"/>
    <rect x="20" y="36" width="8" height="8" fill="url(#qrGrad)"/>
    <rect x="36" y="36" width="8" height="8" fill="url(#qrGrad)"/>
  </g>
  
  <!-- Piatto/Menu stilizzato (metà destra) -->
  <g transform="translate(96, 55)">
    <!-- Piatto -->
    <ellipse cx="35" cy="20" rx="28" ry="8" fill="none" stroke="white" stroke-width="2"/>
    <path d="M 7 20 Q 7 35 35 40 Q 63 35 63 20" fill="white" opacity="0.9"/>
    
    <!-- Utensili (forchetta) -->
    <line x1="25" y1="15" x2="25" y2="35" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="20" cy="12" r="1.5" fill="white"/>
    <circle cx="25" cy="12" r="1.5" fill="white"/>
    <circle cx="30" cy="12" r="1.5" fill="white"/>
  </g>
  
  <!-- Stella decorativa (quality indicator) -->
  <g transform="translate(145, 55)">
    <path d="M 0,-8 L 2.4,-2.4 L 8,-0.8 L 3.2,3.2 L 4.8,9 L 0,5.6 L -4.8,9 L -3.2,3.2 L -8,-0.8 L -2.4,-2.4 Z" 
          fill="white" opacity="0.95"/>
  </g>
  
  <!-- Testo "QR" in basso -->
  <text x="96" y="165" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        text-anchor="middle" fill="white" opacity="0.95">QR</text>
</svg>
