<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea Nuovo Menu - QR Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header { 
            background: #ffffff;
            color: #2c3e50;
            padding: 50px 40px;
            margin-bottom: 30px;
            border-radius: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            position: relative;
            border: 1px solid #e9ecef;
            text-align: center;
        }
        .header h1 {
            font-size: 2.8em;
            font-weight: 800;
            margin-bottom: 14px;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            font-size: 1.15em;
            color: #7f8c8d;
            font-weight: 500;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
            font-weight: bold;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateX(-3px);
        }
        .form-container {
            background: #ffffff;
            padding: 45px 40px;
            border-radius: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #e9ecef;
        }
        .form-group { margin-bottom: 28px; }
        label { 
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: #2c3e50;
            font-size: 16px;
            letter-spacing: 0.01em;
        }
        input, textarea, select { 
            width: 100%;
            min-height: 60px;
            padding: 20px;
            border: 1px solid #e9ecef;
            border-radius: 14px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            transition: all 0.2s ease;
            background: white;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.08);
        }
        textarea { min-height: 140px; resize: vertical; }
        .btn { 
            padding: 16px 32px;
            margin: 8px;
            text-decoration: none;
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.01em;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-success { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .btn-secondary { background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%); }
        .category-section { 
            border: 2px solid #e9ecef;
            padding: 30px;
            margin: 30px 0;
            border-radius: 20px;
            background: rgba(248, 249, 250, 0.5);
            backdrop-filter: blur(10px);
        }
        .category-header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            margin: -30px -30px 25px -30px;
            border-radius: 20px 20px 0 0;
        }
        .category-header h4 {
            font-size: 1.4em;
            font-weight: 700;
        }
        .item-row { display: flex; gap: 14px; margin-bottom: 14px; }
        .item-row input { flex: 1; }
        .remove-btn { 
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .remove-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(250, 112, 154, 0.4);
        }
        h3 {
            font-size: 1.8em;
            margin: 40px 0 24px 0;
            color: #2c3e50;
            font-weight: 700;
            letter-spacing: -0.01em;
        }
        h5 {
            font-size: 1.2em;
            margin: 24px 0 16px 0;
            color: #2c3e50;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .header,
            .form-container {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 42px;
                line-height: 1.1;
            }

            .btn {
                width: 100%;
                margin: 8px 0;
                font-size: 16px;
            }

            .item-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/admin" class="back-btn">← Indietro</a>
            <h1>➕ Crea Nuovo Menu</h1>
            <p>Compila i dettagli del tuo menu digitale</p>
        </div>

        <div class="form-container">
            <form method="POST" id="menuForm">
        <div class="form-group">
            <label for="name">Nome del Menu:</label>
            <input type="text" id="name" name="name" required placeholder="es: Menu della Casa">
        </div>

        <div class="form-group">
            <label for="description">Descrizione del Menu:</label>
            <textarea id="description" name="description" placeholder="Descrivi il tuo menu..."></textarea>
        </div>

        <h3>📋 Categorie del Menu</h3>
        <div id="categories-container">
            <div class="category-section">
                <div class="category-header">
                    <h4>Categoria 1</h4>
                </div>
                <div class="form-group">
                    <label>Nome Categoria:</label>
                    <input type="text" name="category_name[]" placeholder="es: Antipasti" required>
                </div>
                <div class="form-group">
                    <label>Descrizione Categoria:</label>
                    <input type="text" name="category_description[]" placeholder="es: I nostri gustosi antipasti della tradizione">
                </div>
                <h5>🍽️ Piatti di questa categoria:</h5>
                <div class="items-container">
                    <div class="item-row">
                        <input type="text" placeholder="Nome piatto" name="item_name_1[]">
                        <input type="text" placeholder="Descrizione" name="item_description_1[]">
                        <input type="number" step="0.01" placeholder="Prezzo" name="item_price_1[]">
                        <button type="button" class="remove-btn" onclick="removeItem(this)">✗</button>
                    </div>
                </div>
                <button type="button" class="btn btn-secondary" onclick="addItem(this)">➕ Aggiungi Piatto</button>
            </div>
        </div>

        <button type="button" class="btn btn-secondary" onclick="addCategory()">➕ Aggiungi Categoria</button>

        <hr style="margin: 30px 0;">
        
        <div class="form-group">
            <button type="submit" class="btn btn-success">💾 Crea Menu</button>
            <a href="/admin" class="btn btn-secondary">❌ Annulla</a>
        </div>
    </form>
        </div> <!-- end form-container -->
    </div> <!-- end container -->

    <script>
        let categoryCount = 1;

        function addCategory() {
            categoryCount++;
            const container = document.getElementById('categories-container');
            const categoryHtml = `
                <div class="category-section">
                    <div class="category-header">
                        <h4>Categoria ${categoryCount} <button type="button" class="remove-btn" onclick="removeCategory(this)" style="float: right;">✗ Rimuovi Categoria</button></h4>
                    </div>
                    <div class="form-group">
                        <label>Nome Categoria:</label>
                        <input type="text" name="category_name[]" placeholder="es: Primi Piatti" required>
                    </div>
                    <div class="form-group">
                        <label>Descrizione Categoria:</label>
                        <input type="text" name="category_description[]" placeholder="es: I nostri primi piatti della tradizione">
                    </div>
                    <h5>🍽️ Piatti di questa categoria:</h5>
                    <div class="items-container">
                        <div class="item-row">
                            <input type="text" placeholder="Nome piatto" name="item_name_${categoryCount}[]">
                            <input type="text" placeholder="Descrizione" name="item_description_${categoryCount}[]">
                            <input type="number" step="0.01" placeholder="Prezzo" name="item_price_${categoryCount}[]">
                            <button type="button" class="remove-btn" onclick="removeItem(this)">✗</button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-secondary" onclick="addItem(this)">➕ Aggiungi Piatto</button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', categoryHtml);
        }

        function removeCategory(button) {
            if (confirm('Sicuro di voler rimuovere questa categoria?')) {
                button.closest('.category-section').remove();
            }
        }

        function addItem(button) {
            const itemsContainer = button.previousElementSibling;
            const categoryIndex = Array.from(document.querySelectorAll('.category-section')).indexOf(button.closest('.category-section')) + 1;
            const itemHtml = `
                <div class="item-row">
                    <input type="text" placeholder="Nome piatto" name="item_name_${categoryIndex}[]">
                    <input type="text" placeholder="Descrizione" name="item_description_${categoryIndex}[]">
                    <input type="number" step="0.01" placeholder="Prezzo" name="item_price_${categoryIndex}[]">
                    <button type="button" class="remove-btn" onclick="removeItem(this)">✗</button>
                </div>
            `;
            itemsContainer.insertAdjacentHTML('beforeend', itemHtml);
        }

        function removeItem(button) {
            button.closest('.item-row').remove();
        }

        // Validation
        document.getElementById('menuForm').addEventListener('submit', function(e) {
            const categories = document.querySelectorAll('input[name="category_name[]"]');
            let hasValidCategory = false;
            
            categories.forEach(cat => {
                if (cat.value.trim()) {
                    hasValidCategory = true;
                }
            });
            
            if (!hasValidCategory) {
                e.preventDefault();
                alert('Inserisci almeno una categoria con un nome valido.');
                return;
            }
        });
    </script>
</body>
</html>
